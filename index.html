<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>排期日历 · 在线版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- 引入 Supabase 客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 你的原有样式保持不变，我复制过来，但为了简洁，这里省略了，你直接保留原样即可 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f4f6fa; display: flex; justify-content: center; padding: 20px 12px; min-height: 100vh; }
        .container { max-width: 1200px; width: 100%; }
        .main-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-bottom: 24px; }
        .left-col, .right-col { min-width: 0; }
        .card, .calendar-card, .task-card, .modal-content { background: rgba(255,255,255,0.8); backdrop-filter: blur(2px); border-radius: 32px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.02); padding: 20px; transition: all 0.2s ease; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 2rem; font-weight: 600; background: linear-gradient(145deg, #1e293b, #2d3a4f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.02em; }
        .beijing-time { background: white; padding: 8px 20px; border-radius: 40px; border: 1px solid #e2e8f0; font-weight: 500; color: #1e293b; box-shadow: 0 4px 8px rgba(0,0,0,0.02); font-size: 1rem; }
        .btn-primary, .btn-secondary, .btn-report { border: none; padding: 10px 20px; border-radius: 40px; font-weight: 500; font-size: 0.9rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.02), 0 0 0 1px rgba(0,0,0,0.05); transition: 0.15s; }
        .btn-primary { background: #1e293b; color: white; box-shadow: 0 8px 18px -6px #1e293b80; }
        .btn-primary:hover { background: #0f172a; }
        .btn-secondary:hover { background: #f1f5f9; }
        .btn-report { background: #f0f4ff; color: #1e3a8a; border: 1px solid #b9d0ff; }
        .calendar-wrapper { background: white; border-radius: 28px; padding: 16px; border: 1px solid #f0f2f5; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .calendar-month { font-size: 1.2rem; font-weight: 600; color: #0b1e33; }
        .calendar-nav { display: flex; gap: 6px; }

        .cal-day { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; border-radius: 20px; cursor: pointer; transition: 0.1s; background: #f8fafc; color: #1e293b; font-weight: 500; position: relative; }
        .cal-day.today { background: #1e293b; color: white; font-weight: 600; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .cal-day.selected { outline: 2px solid #3b82f6; outline-offset: 1px; }
        .cal-day.overdue { color: #b91c1c; font-weight: 600; }
        .cal-day.overdue .task-indicator { background: #b91c1c; }
        .cal-day.empty { background: transparent; cursor: default; }
        .cal-day:not(.empty):hover { background: #e2e8f0; }
        .task-indicator { width: 3px; height: 3px; background: #3b82f6; border-radius: 3px; margin-top: 1px; }
        .add-section { height: fit-content; }
        .upload-area { border: 2px dashed #cfddee; border-radius: 24px; padding: 16px; text-align: center; background: #fafcff; cursor: pointer; transition: 0.15s; margin-bottom: 12px; }
        .upload-area:hover { border-color: #3b82f6; background: #eff6ff; }
        .upload-icon { font-size: 2rem; opacity: 0.5; margin-bottom: 4px; }
        .preview-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .preview-item { position: relative; width: 60px; height: 60px; border-radius: 16px; overflow: hidden; border: 1px solid #dde7f0; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-img { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .input-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 8px; align-items: center; }
        .input-row input, .input-row textarea { padding: 10px 16px; border: 1px solid #e2e8f0; border-radius: 30px; font-size: 0.9rem; flex: 1 1 150px; background: white; outline: none; }
        .input-row textarea { border-radius: 20px; min-height: 50px; }
        .input-row .days-wrapper { display: flex; align-items: center; background: #f1f5f9; padding: 4px 12px 4px 18px; border-radius: 30px; border: 1px solid #e2e8f0; }
        .days-wrapper input { width: 60px; text-align: center; border: none; background: transparent; padding: 8px 0; font-weight: 600; }
        .tasks-header { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 12px; }
        .tasks-header h2 { font-size: 1.3rem; font-weight: 600; color: #0f172a; }
        .task-list { display: flex; flex-direction: column; gap: 14px; }
        .task-card { background: white; border-radius: 24px; padding: 16px; border: 2px solid transparent; transition: 0.15s; display: flex; flex-wrap: wrap; gap: 14px; position: relative; cursor: pointer; }
        .task-card:hover { background: #fbfdff; border-color: #d0e0ff; }
        .task-card.completed { background: #f0f9f0; border-color: #c0e0c0; opacity: 0.85; }
        .task-card.completed .task-title { text-decoration: line-through; color: #4b6a4b; }
        .task-card.overdue { border-color: #fecaca; background: #fff5f5; }
        .task-check { position: absolute; top: 14px; right: 14px; width: 20px; height: 20px; accent-color: #2e7d32; cursor: pointer; z-index: 3; }
        .task-thumbnails { display: flex; flex-wrap: wrap; gap: 6px; flex: 1 1 120px; pointer-events: none; }
        .thumb { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 1px solid #d7e1ec; cursor: pointer; transition: 0.1s; pointer-events: auto; }

        .task-urls { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 6px; pointer-events: auto; }
        .url-link { color: #2563eb; text-decoration: none; font-size: 0.85rem; border-bottom: 1px dashed #a5c0fa; padding-bottom: 1px; }
        .url-link:hover { border-bottom: 1px solid #2563eb; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }

        .modal-header h3 { font-size: 1.4rem; font-weight: 600; }
        .close-modal { background: none; border: none; font-size: 1.8rem; cursor: pointer; line-height: 1; }
        .gallery-modal .modal-content { max-width: 800px; background: #0b0f17; color: white; }
        .gallery-container { display: flex; flex-direction: column; align-items: center; }
        .gallery-image { max-width: 100%; max-height: 60vh; border-radius: 20px; margin-bottom: 16px; }
        .gallery-nav { display: flex; gap: 20px; align-items: center; }
        .gallery-nav button { background: rgba(255,255,255,0.2); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; }
        .report-paper { background: white; padding: 24px; border-radius: 40px; max-width: 800px; margin: 0 auto; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.25); }
        .report-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eef2f6; padding-bottom: 16px; margin-bottom: 20px; }
        .report-header h2 { font-size: 1.8rem; font-weight: 600; color: #0b1e33; }
        .report-header .date { font-size: 1rem; color: #62748c; background: #f0f4fa; padding: 6px 18px; border-radius: 30px; }
        .report-list { display: flex; flex-direction: column; gap: 24px; }
        .report-item { background: #fafcff; border-radius: 24px; padding: 20px; border: 1px solid #e9f0f8; }
        .report-item.completed { border-left: 6px solid #4caf50; }
        .report-title { font-weight: 600; font-size: 1.2rem; color: #0f172a; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .status-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 40px; background: #e2e8f0; color: #334155; }
        .status-badge.completed { background: #dff0d8; color: #2e7d32; }
        .report-meta { display: flex; flex-direction: column; gap: 4px; color: #475569; font-size: 0.9rem; margin-bottom: 12px; }
        .report-images { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; }
        .report-images img { max-width: 100%; height: auto; border-radius: 16px; border: 1px solid #d7e1ec; max-height: 250px; object-fit: contain; }
        .report-footer { margin-top: 24px; text-align: right; color: #94a3b8; font-style: italic; border-top: 1px dashed #cfddee; padding-top: 16px; }
        .storage-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; background: #ffffffc0; backdrop-filter: blur(8px); border-radius: 40px; padding: 12px 20px; margin: 20px 0 12px; border: 1px solid #eef3f9; font-size: 0.9rem; color: #1e2f44; }
        .storage-stats { display: flex; gap: 20px; flex-wrap: wrap; }
        .storage-actions { display: flex; gap: 10px; }
        .hidden { display: none; }
        .text-small { color: #6c7a8e; font-size: 0.8rem; margin-top: 6px; }
        .export-btn { background: #1e293b; color: white; border: none; border-radius: 40px; padding: 10px 20px; font-weight: 500; cursor: pointer; margin-top: 16px; width: 100%; }
        .field-label { font-weight: 600; color: #334155; margin-bottom: 4px; font-size: 0.9rem; }
        .created-time { font-size: 0.75rem; color: #8a9cb0; margin-top: 4px; }

        /* 登录区域样式 */
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
        }
        .auth-container input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 1rem;
        }
        .auth-container button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-container .switch {
            margin-top: 16px;
            color: #3b82f6;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 登录/注册界面（默认显示） -->
    <div id="authContainer" class="auth-container">
        <h2 style="margin-bottom: 20px;">🔐 登录排期工具</h2>

            <div class="switch" id="showSignup">没有账号？点此注册</div>

    <!-- 主界面（登录后显示） -->

                <input type="number" id="editDuration" min="1" value="1">
            </div>

            <div class="field-label">🔗 网址 (多个用逗号分隔)</div>
            <div class="input-row">
                <textarea id="editUrls" placeholder="https://... , http://..."></textarea>

                    <span id="galleryCounter"></span>

                </div>
            </div>
        </div>
    </div>

            <button class="export-btn" id="exportReportBtn">📥 导出为JPG图片</button>
        </div>
    </div>

            const month = String(beijingTime.getMonth() + 1).padStart(2, '0');
            const day = String(beijingTime.getDate()).padStart(2, '0');
            const hours = String(beijingTime.getHours()).padStart(2, '0');
            const minutes = String(beijingTime.getMinutes()).padStart(2, '0');
            const seconds = String(beijingTime.getSeconds()).padStart(2, '0');
            beijingTimeSpan.innerText = `北京时间 ${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateBeijingTime, 1000);
        updateBeijingTime();

        // ========== 辅助函数 ==========
        function formatLocalDate(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getLocalDateFromISO(isoString) {
            const d = new Date(isoString);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function isTaskActiveOnDate(task, dateStr) {
            const startDateStr = getLocalDateFromISO(task.created_at);
            if (dateStr < startDateStr) return false;
            const startDate = new Date(startDateStr + 'T00:00:00');
            const endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + task.duration - 1);
            const checkDate = new Date(dateStr + 'T00:00:00');
            return checkDate >= startDate && checkDate <= endDate;
        }

        function isTaskOverdue(task, referenceDate = new Date()) {
            if (task.completed) return false;
            const startDateStr = getLocalDateFromISO(task.created_at);
            const startDate = new Date(startDateStr + 'T00:00:00');
            const endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + task.duration - 1);
            const refStr = formatLocalDate(referenceDate);
            const refDate = new Date(refStr + 'T00:00:00');
            return refDate > endDate;
        }

        function getActiveTasksForDate(dateStr) {
            return tasks.filter(t => isTaskActiveOnDate(t, dateStr));
        }

        // ========== 从数据库加载任务 ==========
        async function loadTasksFromDB() {
            if (!currentUser) return;
            const { data, error } = await supabase
                .from('tasks')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            if (error) {
                console.error('加载失败', error);
                alert('加载任务失败：' + error.message);
                return;
            }
            tasks = data || [];
            // 兼容旧数据：确保 images 是数组
            tasks.forEach(t => {
                if (!t.images) t.images = [];
                if (!t.urls) t.urls = [];
            });
            renderTasksByDate(selectedDate);
            renderCalendar();
        }

        // ========== 保存任务到数据库（增/删/改） ==========
        // 注意：每次修改后调用此函数同步到数据库，但实际是直接操作单条记录更合适。
        // 为了简化，我们采用每次修改后整体替换？不，应该针对单条记录操作。
        // 但为了兼容原有代码习惯，我们写一个 saveTaskToDB 用于新增/更新，以及 deleteTaskFromDB。
        // 这里我们重新设计：每次新增、更新、删除时直接调用对应的 API，然后重新加载列表。

        // 新增任务
        async function addTaskToDB(taskData) {
            if (!currentUser) return;
            const { data, error } = await supabase
                .from('tasks')
                .insert([{ ...taskData, user_id: currentUser.id }])
                .select();
            if (error) {
                alert('添加失败：' + error.message);
                return null;
            }
            return data[0];
        }

        // 更新任务
        async function updateTaskInDB(taskId, updates) {
            const { error } = await supabase
                .from('tasks')
                .update(updates)
                .eq('id', taskId)
                .eq('user_id', currentUser.id); // 确保是自己的
            if (error) {
                alert('更新失败：' + error.message);
                return false;
            }
            return true;
        }

        // 删除任务
        async function deleteTaskFromDB(taskId) {
            const { error } = await supabase
                .from('tasks')
                .delete()
                .eq('id', taskId)
                .eq('user_id', currentUser.id);
            if (error) {
                alert('删除失败：' + error.message);
                return false;
            }
            return true;
        }

        // 删除多个任务（清空所有）
        async function deleteAllTasks() {
            const { error } = await supabase
                .from('tasks')
                .delete()
                .eq('user_id', currentUser.id);
            if (error) {
                alert('清空失败：' + error.message);
                return false;
            }
            return true;
        }

        // ========== 图片上传到 Supabase Storage ==========
        async function uploadImages(files) {
            if (!files || files.length === 0) return [];
            const uploadedUrls = [];
            for (const file of files) {
                // 生成唯一文件名
                const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${file.name.split('.').pop()}`;
                const { data, error } = await supabaseClient.storage
                    .from(STORAGE_BUCKET)
                    .upload(fileName, file);
                if (error) {
                    console.error('上传失败', error);
                    continue;
                }
                // 获取公共 URL
                const { data: urlData } = supabaseClient.storage
                    .from(STORAGE_BUCKET)
                    .getPublicUrl(fileName);
                uploadedUrls.push(urlData.publicUrl);
            }
            return uploadedUrls;
        }

        // ========== 登录/登出 ==========
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                authContainer.classList.add('hidden');
                mainApp.classList.remove('hidden');
                // 初始化选中日期为今天
                selectedDate = formatLocalDate(new Date());
                currentMonth = new Date();
                renderCalendar();
                await loadTasksFromDB();
            } else {
                authContainer.classList.remove('hidden');
                mainApp.classList.add('hidden');
            }
        }

        loginBtn.addEventListener('click', async () => {
            const email = loginEmail.value;
            const password = loginPassword.value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert('登录失败：' + error.message);
            else checkSession();
        });

        signupBtn.addEventListener('click', async () => {
            const email = loginEmail.value;
            const password = loginPassword.value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert('注册失败：' + error.message);
            else alert('注册成功，请登录');
        });

        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            currentUser = null;
            tasks = [];
            authContainer.classList.remove('hidden');
            mainApp.classList.add('hidden');
        });

        // 监听认证状态变化
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') {
                currentUser = session.user;
                checkSession();
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                tasks = [];
                authContainer.classList.remove('hidden');
                mainApp.classList.add('hidden');
            }
        });

        // 初始化检查
        checkSession();

        // ========== 渲染任务列表 ==========
        function renderTasksByDate(dateStr) {
            const activeTasks = getActiveTasksForDate(dateStr);
            const d = new Date(dateStr + 'T12:00:00');
            selectedDateTitle.innerText = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · 活跃任务`;
            taskCountSpan.innerText = activeTasks.length + '项';

            if (activeTasks.length === 0) {
                taskListDiv.innerHTML = `<div class="empty-state" style="padding:40px; text-align:center; background:#f8fafc; border-radius:40px; color:#94a3b8;">✨ 这天没有活跃任务</div>`;
                return;
            }

            activeTasks.sort((a,b) => (a.created_at > b.created_at ? -1 : 1));

            let html = '';
            activeTasks.forEach(task => {
                const completedClass = task.completed ? 'completed' : '';
                const overdueClass = (!task.completed && isTaskOverdue(task, new Date(dateStr + 'T12:00:00'))) ? 'overdue' : '';
                let thumbsHtml = '';
                if (task.images && task.images.length) {
                    task.images.slice(0,4).forEach((img, idx) => {
                        thumbsHtml += `<img src="${img}" class="thumb" data-task-id="${task.id}" data-img-index="${idx}" alt="缩略图">`;
                    });
                    if (task.images.length > 4) {
                        thumbsHtml += `<div class="thumb" style="background:#e6edf5; display:flex; align-items:center; justify-content:center;">+${task.images.length-4}</div>`;
                    }
                } else {
                    thumbsHtml = `<div class="thumb" style="background:#eef3f9; display:flex; align-items:center; justify-content:center;">📷</div>`;
                }

                let urlsHtml = '';
                if (task.urls && task.urls.length) {
                    task.urls.forEach(u => {
                        if (u.trim()) {
                            let display = u.replace(/^https?:\/\//, '').substring(0,20);
                            urlsHtml += `<a href="${u}" target="_blank" class="url-link" title="${u}">${display}⋯</a>`;
                        }
                    });
                }

                const startDateStr = getLocalDateFromISO(task.created_at);
                const startDate = new Date(startDateStr + 'T00:00:00');
                const endDate = new Date(startDate);
                endDate.setDate(startDate.getDate() + task.duration - 1);
                const endDateStr = formatLocalDate(endDate);
                const dateRange = `${startDateStr} 至 ${endDateStr} (共${task.duration}天)`;

                let overdueInfo = '';
                if (!task.completed && isTaskOverdue(task, new Date())) {
                    const today = new Date();
                    const end = new Date(endDateStr + 'T00:00:00');
                    const delayDays = Math.ceil((today - end) / (1000*60*60*24));
                    overdueInfo = `<span style="color:#b91c1c; font-weight:600;">⚠️ 延期 ${delayDays} 天</span>`;
                }

                const createdTimeStr = new Date(task.created_at).toLocaleTimeString('zh-CN', { hour12: false });

                html += `
                    <div class="task-card ${completedClass} ${overdueClass}" data-task-id="${task.id}">
                        <input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''} data-id="${task.id}">
                        <div class="task-thumbnails" data-task-id="${task.id}">
                            ${thumbsHtml}
                        </div>
                        <div class="task-info">
                            <div class="task-title">${escapeHtml(task.title) || '未命名'}</div>
                            <div class="task-meta">
                                <span>📅 ${dateRange}</span>
                                ${overdueInfo}
                            </div>
                            <div class="task-urls">${urlsHtml}</div>
                            <div class="created-time">⏱️ 创建: ${createdTimeStr}</div>
                        </div>
                    </div>
                `;
            });
            taskListDiv.innerHTML = html;

            // 绑定复选框
            document.querySelectorAll('.task-check').forEach(cb => {
                cb.addEventListener('change', async function(e) {
                    e.stopPropagation();
                    const id = this.dataset.id;
                    const task = tasks.find(t => t.id === id);
                    if (task) {
                        task.completed = this.checked;
                        await updateTaskInDB(id, { completed: task.completed });
                        // 重新加载列表以刷新样式
                        await loadTasksFromDB();
                    }
                });
            });

            // 缩略图点击
            document.querySelectorAll('.thumb').forEach(thumb => {
                thumb.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const taskId = this.dataset.taskId;
                    const imgIdx = parseInt(this.dataset.imgIndex, 10);
                    if (!isNaN(imgIdx) && taskId) {
                        const task = tasks.find(t => t.id === taskId);
                        if (task && task.images) {
                            openGallery(task.images, imgIdx);
                        }
                    }
                });
            });

            // 卡片点击编辑
            document.querySelectorAll('.task-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (e.target.classList.contains('task-check') || e.target.classList.contains('url-link') || e.target.classList.contains('thumb')) {
                        return;
                    }
                    const id = this.dataset.taskId;
                    const task = tasks.find(t => t.id === id);
                    if (task) {
                        openEditModal(task);
                    }
                });
            });
        }

        // ========== 日历渲染（与原来相同，但数据来自 tasks） ==========
        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const firstDay = new Date(year, month, 1);
            const startDayOfWeek = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            calendarMonthSpan.innerText = `${year}年${month+1}月`;

            let gridHtml = '';
            for (let i = 0; i < startDayOfWeek; i++) {
                gridHtml += `<div class="cal-day empty"></div>`;
            }
            const todayStr = formatLocalDate(new Date());
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const activeTasks = getActiveTasksForDate(dateStr);
                const hasTask = activeTasks.length > 0;
                const hasOverdue = activeTasks.some(t => !t.completed && isTaskOverdue(t, new Date(dateStr + 'T12:00:00')));
                const isToday = dateStr === todayStr;
                const isSelected = dateStr === selectedDate;
                let dayClass = 'cal-day';
                if (isToday) dayClass += ' today';
                if (isSelected) dayClass += ' selected';
                if (hasOverdue) dayClass += ' overdue';
                gridHtml += `<div class="${dayClass}" data-date="${dateStr}">${d}${hasTask ? '<span class="task-indicator' + (hasOverdue ? ' overdue' : '') + '"></span>' : ''}</div>`;
            }
            calendarGrid.innerHTML = gridHtml;

            document.querySelectorAll('.cal-day[data-date]').forEach(day => {
                day.addEventListener('click', (e) => {
                    const date = day.dataset.date;
                    selectedDate = date;
                    renderTasksByDate(selectedDate);
                    document.querySelectorAll('.cal-day').forEach(d => d.classList.remove('selected'));
                    day.classList.add('selected');
                });
            });
        }

        prevMonthBtn.addEventListener('click', () => {
            currentMonth.setMonth(currentMonth.getMonth() - 1);
            renderCalendar();
        });
        nextMonthBtn.addEventListener('click', () => {
            currentMonth.setMonth(currentMonth.getMonth() + 1);
            renderCalendar();
        });

        // ========== 新建任务图片处理 ==========
        function processFiles(files) {
            const valid = Array.from(files).filter(f => f.type.startsWith('image/'));
            valid.forEach(file => {
                // 生成预览（临时URL）
                const reader = new FileReader();
                reader.onload = e => {
                    // 将文件对象存入 currentImages（用于后续上传）
                    currentImages.push({ file, preview: e.target.result });
                    renderPreviews();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderPreviews() {
            if (!currentImages.length) {
                previewContainer.innerHTML = '';
                return;
            }
            let html = '';
            currentImages.forEach((img, i) => {
                html += `<div class="preview-item"><img src="${img.preview}"><button class="remove-img" data-index="${i}">✕</button></div>`;
            });
            previewContainer.innerHTML = html;
            document.querySelectorAll('#previewContainer .remove-img').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index, 10);
                    currentImages.splice(idx, 1);
                    renderPreviews();
                });
            });
        }

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#3b82f6'; });
        uploadArea.addEventListener('dragleave', () => uploadArea.style.borderColor = '#cfddee');
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#cfddee';
            if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) processFiles(fileInput.files);
            fileInput.value = '';
        });
        document.addEventListener('paste', (e) => {
            if (!editModal.classList.contains('hidden')) return;
            const items = e.clipboardData?.items;
            if (!items) return;
            const imgFiles = [];
            for (let item of items) {
                if (item.type.indexOf('image') === 0) {
                    const file = item.getAsFile();
                    if (file) imgFiles.push(file);
                }
            }
            if (imgFiles.length) {
                e.preventDefault();
                processFiles(imgFiles);
            }
        });

        // ========== 添加任务 ==========
        addBtn.addEventListener('click', async function() {
            if (isAdding) return;
            isAdding = true;
            addBtn.disabled = true;

            try {
                const title = taskTitle.value.trim() || '未命名';
                const duration = parseInt(taskDuration.value, 10) || 1;
                const urlsStr = taskUrls.value.trim();
                const urls = urlsStr ? urlsStr.split(',').map(s => s.trim()).filter(s => s.startsWith('http')) : [];

                // 先上传图片
                const imageFiles = currentImages.map(item => item.file);
                const uploadedUrls = await uploadImages(imageFiles);

                // 构造任务对象
                const now = new Date();
                const [year, month, day] = selectedDate.split('-').map(Number);
                const localDate = new Date(year, month-1, day, now.getHours(), now.getMinutes(), now.getSeconds());
                const createdAt = localDate.toISOString();

                const newTask = {
                    id: Date.now() + '-' + Math.random().toString(36).substring(2,8),
                    title,
                    duration,
                    images: uploadedUrls,
                    urls,
                    completed: false,
                    created_at: createdAt
                };

                const added = await addTaskToDB(newTask);
                if (added) {
                    // 清空输入
                    taskTitle.value = '';
                    taskDuration.value = 1;
                    taskUrls.value = '';
                    currentImages = [];
                    renderPreviews();
                    
                    // 重新加载任务列表
                    await loadTasksFromDB();
                    renderCalendar();
                }
            } finally {
                isAdding = false;
                addBtn.disabled = false;
            }
        });

        // ========== 编辑任务 ==========
        function openEditModal(task) {
            editTaskId.value = task.id;
            editTitle.value = task.title || '';
            editDuration.value = task.duration || 1;
            editUrls.value = (task.urls || []).join(', ');
            // 编辑图片：task.images 是URL数组，我们需要用这些URL来预览，但不能直接编辑原URL
            // 简单起见，我们只允许添加新图片，不能删除已有图片（或需要单独处理）
            // 这里简化：编辑时不处理已有图片的删除，只允许添加新图片
            editCurrentImages = []; // 存储新添加的图片文件对象
            renderEditPreviews(task.images || []);
        }

        function renderEditPreviews(existingUrls = []) {
            let html = '';
            // 先显示已有的图片（只读，不能删除）
            existingUrls.forEach((url, i) => {
                html += `<div class="preview-item"><img src="${url}"><span class="remove-img" style="background: #999;">🔒</span></div>`;
            });
            // 再显示新添加的待上传图片（可删除）
            editCurrentImages.forEach((img, i) => {
                html += `<div class="preview-item"><img src="${img.preview}"><button class="remove-img" data-index="${i}">✕</button></div>`;
            });
            editPreviewContainer.innerHTML = html;
            document.querySelectorAll('#editPreviewContainer .remove-img').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index, 10);
                    editCurrentImages.splice(idx, 1);
                    renderEditPreviews(existingUrls);
                });
            });
        }

        function processEditFiles(files) {
            const valid = Array.from(files).filter(f => f.type.startsWith('image/'));
            valid.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    editCurrentImages.push({ file, preview: e.target.result });
                    // 重新渲染，需要传入当前任务原有的URL
                    const task = tasks.find(t => t.id === editTaskId.value);
                    renderEditPreviews(task?.images || []);
                };
                reader.readAsDataURL(file);
            });
        }

        editUploadArea.addEventListener('click', () => editFileInput.click());
        editUploadArea.addEventListener('dragover', (e) => { e.preventDefault(); editUploadArea.style.borderColor = '#3b82f6'; });
        editUploadArea.addEventListener('dragleave', () => editUploadArea.style.borderColor = '#cfddee');
        editUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            editUploadArea.style.borderColor = '#cfddee';
            if (e.dataTransfer.files.length) processEditFiles(e.dataTransfer.files);
        });
        editFileInput.addEventListener('change', () => {
            if (editFileInput.files.length) processEditFiles(editFileInput.files);
            editFileInput.value = '';
        });
        document.addEventListener('paste', (e) => {
            if (editModal.classList.contains('hidden')) return;
            const items = e.clipboardData?.items;
            if (!items) return;
            const imgFiles = [];
            for (let item of items) {
                if (item.type.indexOf('image') === 0) {
                    const file = item.getAsFile();
                    if (file) imgFiles.push(file);
                }
            }
            if (imgFiles.length) {
                e.preventDefault();
                processEditFiles(imgFiles);
            }
        });

        saveEditBtn.addEventListener('click', async () => {
            const id = editTaskId.value;
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            // 上传新图片
            const imageFiles = editCurrentImages.map(item => item.file);
            const newUrls = await uploadImages(imageFiles);
            // 合并原有URL和新URL
            const allImages = [...(task.images || []), ...newUrls];

            const updates = {
                title: editTitle.value.trim(),
                duration: parseInt(editDuration.value, 10) || 1,
                urls: editUrls.value.trim().split(',').map(s => s.trim()).filter(s => s.startsWith('http')),
                images: allImages
            };

            const success = await updateTaskInDB(id, updates);
            if (success) {
                await loadTasksFromDB();
                editModal.classList.add('hidden');
            }
        });

        closeEditModal.addEventListener('click', () => editModal.classList.add('hidden'));

        // ========== 画廊 ==========
        function openGallery(images, startIndex) {
            currentGallery = { images, index: startIndex };
            updateGallery();
            galleryModal.classList.remove('hidden');
        }
        function updateGallery() {
            if (!currentGallery.images.length) return;
            galleryImg.src = currentGallery.images[currentGallery.index];
            galleryCounter.innerText = `${currentGallery.index+1} / ${currentGallery.images.length}`;
        }
        galleryPrev.addEventListener('click', () => {
            if (currentGallery.images.length) {
                currentGallery.index = (currentGallery.index - 1 + currentGallery.images.length) % currentGallery.images.length;
                updateGallery();
            }
        });
        galleryNext.addEventListener('click', () => {
            if (currentGallery.images.length) {
                currentGallery.index = (currentGallery.index + 1) % currentGallery.images.length;
                updateGallery();
            }
        });
        closeGallery.addEventListener('click', () => galleryModal.classList.add('hidden'));

        // ========== 清空所有 ==========
        clearAllBtn.addEventListener('click', async () => {
            if (confirm('确认清空所有任务？')) {
                const success = await deleteAllTasks();
                if (success) {
                    tasks = [];
                    renderTasksByDate(selectedDate);
                    renderCalendar();
                }
            }
        });

        // ========== 日报生成（与原来相同） ==========
        function generateReportHTMLForDate(dateStr) {
            const activeTasks = getActiveTasksForDate(dateStr);
            if (!activeTasks.length) {
                return '<div style="text-align:center; padding:40px;">该天没有活跃任务</div>';
            }

            let itemsHtml = '';
            activeTasks.forEach(task => {
                let imagesHtml = '';
                if (task.images && task.images.length) {
                    task.images.forEach(img => {
                        imagesHtml += `<img src="${img}" alt="截图">`;
                    });
                } else {
                    imagesHtml = '<div style="padding:16px; background:#f1f5f9; border-radius:16px; color:#94a3b8;">无图片</div>';
                }
                let urlsHtml = '';
                if (task.urls && task.urls.length) {
                    urlsHtml = '<div style="margin-top:12px;">' + task.urls.map(u => `<a href="${u}" target="_blank" style="margin-right:16px;">🔗 链接</a>`).join('') + '</div>';
                }
                const startDateStr = getLocalDateFromISO(task.created_at);
                const startDate = new Date(startDateStr + 'T00:00:00');
                const endDate = new Date(startDate);
                endDate.setDate(startDate.getDate() + task.duration - 1);
                const endDateStr = formatLocalDate(endDate);
                const dateRange = `${startDateStr} 至 ${endDateStr}`;

                const statusClass = task.completed ? 'completed' : '';
                const statusText = task.completed ? '✅ 已完成' : '⏳ 未完成';
                const statusBadgeClass = task.completed ? 'completed' : '';

                itemsHtml += `
                    <div class="report-item ${statusClass}">
                        <div class="report-title">
                            ${escapeHtml(task.title) || '未命名'}
                            <span class="status-badge ${statusBadgeClass}">${statusText}</span>
                        </div>
                        <div class="report-meta">
                            <span>📅 周期: ${dateRange} (${task.duration}天)</span>
                        </div>
                        <div class="report-images">
                            ${imagesHtml}
                        </div>
                        ${urlsHtml}
                    </div>
                `;
            });

            return `
                <div class="report-paper" id="reportPaper">
                    <div class="report-header">
                        <h2>📋 需求简报</h2>
                        <div class="date">${dateStr}</div>
                    </div>
                    <div class="report-list">
                        ${itemsHtml}
                    </div>
                    <div class="report-footer">
                        生成于 ${new Date().toLocaleTimeString()}
                    </div>
                </div>
            `;
        }

        reportBtn.addEventListener('click', () => {
            const html = generateReportHTMLForDate(selectedDate);
            reportPreviewArea.innerHTML = html;
            reportDateSpan.innerText = selectedDate;
            reportModal.classList.remove('hidden');
        });

        closeReport.addEventListener('click', () => reportModal.classList.add('hidden'));

        exportReportBtn.addEventListener('click', () => {
            const reportPaper = document.getElementById('reportPaper');
            if (!reportPaper) {
                alert('请先生成日报');
                return;
            }
            html2canvas(reportPaper, {
                scale: 2,
                backgroundColor: '#ffffff',
                allowTaint: false,
                useCORS: true,
                logging: false,
                windowWidth: reportPaper.scrollWidth,
                windowHeight: reportPaper.scrollHeight
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `简报-${selectedDate}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                alert('导出失败：' + err);
            });
        });

        // 点击模态框外部关闭
        window.addEventListener('click', (e) => {
            if (e.target === editModal) editModal.classList.add('hidden');
            if (e.target === galleryModal) galleryModal.classList.add('hidden');
            if (e.target === reportModal) reportModal.classList.add('hidden');
        });

        function escapeHtml(unsafe) {
            if (!unsafe) return unsafe;
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                if(m === '"') return '&quot;';
                return m;
            });
        }
    </script>
</body>
</html>
